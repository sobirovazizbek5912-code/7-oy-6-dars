<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Elonlar Sayti</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">
            🚗 Elonlar
        </a>
    </div>
</nav>

<div class="container mt-4">
    <main>
        <ul class="messages">
            {% for message in messages %}
            <li class="alert alert-{% if message.tags == 'error' %}danger{%else%}{{message.tags}}{%endif%}">{{message}}</li>
            {%endfor%}
        </ul>

    {% block content %}
    {% endblock %}
    </main>
</div>

</body>
</html>
